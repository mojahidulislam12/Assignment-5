<!DOCTYPE html>
<html lang="en" data-theme="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <title>GitHub Issues Tracker | Home</title>
    <!-- Tailwind + Daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="md:w-full w-[768px] bg-base-200 min-h-screen">
    <header class="md:h-[78px] h-[78px] bg-white">
        <div class="flex justify-between items-center   ml-[80px] mr-[80px] ">
            <div class="flex justify-start items-center  gap-1 mt-[22.5px]">
                <img class="w-9 h-[37px]" src="assets/github-logo.png" alt="" srcset="">
                <h1 class="font-semibold text-[24px] text-[#1F2937]">GitHub Issues Tracker</h1>
            </div>
            <div class="join mt-[22.5px]">
                <div class="mr-[16px]">
                    <label class="input validator join-item">
                        <input id="input-search" type="text" placeholder="Search Vocabulary Now..." required />
                    </label>
                    <p>Search by: low,high,medium keyword</p>
                </div>
                <button id="btn-search" class="btn btn-primary join-item">Search</button>
            </div>

        </div>

    </header>
    <section class="md:w-[1450px] w-full h-[88px] md:text-left text-center mx-auto bg-white mt-[60px]">
        <div class="p-6 space-x-2">
            <button id="allIssues" onclick="" class="btn w-[120px] h-[40px]">All</button>

            <button id="allOpens" onclick="" class="btn w-[120px] h-[40px]">Open</button>
            <button id="allCloseds" onclick="" class="btn w-[120px] h-[40px]">Closed</button>
        </div>
    </section>
    <div id="lodingSpiner" class="text-center hidden">
        <span class="loading loading-spinner loading-xl align-middle"></span>
    </div>
    <section id="Issues-container" class="md:w-[1450px] w-[768px] mx-auto p-4 bg-[#FBFBFB]  ">
        <div id="total-count">

        </div>
        <div id="issues-container" class="grid grid-cols-2 md:grid-cols-4 gap-5">
        </div>


    </section>

    <section id="Opens-container" class=" md:w-[1450px] w-[768px] mx-auto p-4 bg-[#FBFBFB] ">
        <div id="total-count2">

        </div>
        <div id="open-container" class=" grid grid-cols-2 md:grid-cols-4 gap-5">

        </div>


    </section>
    <section id="Closed-container" class="md:w-[1450px] w-[768px] mx-auto p-4 bg-[#FBFBFB] ">
        <div id="total3-count">

        </div>
        <div id="closed-container" class=" grid grid-cols-2 md:grid-cols-4 gap-5">

        </div>
    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

    <dialog id="my_modal_5" class="modal  modal-bottom sm:modal-middle">
        <div class="modal-box ">
            <div id="details-container" class="space-y-2 h-[414px] w-[700px]">

                <div class="flex justify-between ">
                    <p class="font-bold text-[24px] text-[#1F2937]">title</p>
                </div>
                <div class="flex items-center gap-2">
                    <button class="btn w-[62px] h-[24px] bg-[#00A96E] text-[#FFFFFF] rounded-[100px]">Opened</button>
                    <p class="font-normal text-[12px] text-[#64748B]">Opened by Fahim Ahmed</p>
                    <p class="font-normal text-[12px] text-[#64748B]">22/02/2026</p>

                </div>
                <div class="flex gap-2">
                    <button class="btn">btn1</button>
                    <button class="btn">btn1</button>

                </div>
                <p class="font-normal text-[16px]  text-[#64748B]">The navigation menu doesn't collapse properly on
                    mobile devices. Need to fix the responsive behavior.</p>




            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="js/opens.js"></script>
    <script src="js/Allissues.js"></script>
</body>

</html>
